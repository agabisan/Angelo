<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Angelo Gabisan – Downloadable Calling Card" />
  <title>Angelo Gabisan | Calling Card</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js" integrity="sha384-OLBgp1GsljhM2TJ+sbHjaiH9txEUvgdDTAzHv2P24donTt6/529l+9Ua0vFImLlb" crossorigin="anonymous" defer></script>
  <style>
    /* ---------- CSS Custom Properties ---------- */
    :root {
      --bg:          #f8f9fc;
      --surface:     #ffffff;
      --surface-2:   #f0f2f8;
      --border:      #e2e8f0;
      --text:        #1a202c;
      --text-muted:  #718096;
      --accent:      #6c63ff;
      --accent-dark: #5a53e0;
      --accent-glow: rgba(108, 99, 255, 0.18);
      --font:        'Inter', system-ui, -apple-system, sans-serif;
      --radius:      12px;
      --tr:          0.25s ease;
    }

    body.dark {
      --bg:         #0f1117;
      --surface:    #1a1d27;
      --surface-2:  #141720;
      --border:     #2d3148;
      --text:       #e2e8f0;
      --text-muted: #8892b0;
      --accent:     #7c73ff;
      --accent-dark:#9d96ff;
      --accent-glow:rgba(124, 115, 255, 0.2);
    }

    /* ---------- Reset ---------- */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      line-height: 1.7;
      transition: background var(--tr), color var(--tr);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    a { color: inherit; text-decoration: none; }

    /* ---------- Page Header ---------- */
    .page-header {
      text-align: center;
      margin-bottom: 2rem;
    }

    .page-header h1 {
      font-size: clamp(1.5rem, 4vw, 2rem);
      font-weight: 800;
      margin-bottom: 0.25rem;
    }

    .page-header p {
      color: var(--text-muted);
      font-size: 0.95rem;
    }

    /* ---------- Calling Card ---------- */
    .card-wrapper {
      perspective: 1200px;
      margin-bottom: 2rem;
    }

    .calling-card {
      width: 550px;
      max-width: 100%;
      border-radius: var(--radius);
      background: var(--surface);
      border: 1px solid var(--border);
      overflow: hidden;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    }

    .card-top {
      background: linear-gradient(135deg, var(--accent), var(--accent-dark));
      padding: 2rem 2rem 1.5rem;
      position: relative;
      overflow: hidden;
    }

    .card-top::before {
      content: '';
      position: absolute;
      top: -40%;
      right: -20%;
      width: 200px;
      height: 200px;
      border-radius: 50%;
      background: rgba(255,255,255,0.08);
    }

    .card-top::after {
      content: '';
      position: absolute;
      bottom: -30%;
      left: -10%;
      width: 140px;
      height: 140px;
      border-radius: 50%;
      background: rgba(255,255,255,0.06);
    }

    .card-initials {
      width: 56px;
      height: 56px;
      border-radius: 50%;
      background: rgba(255,255,255,0.2);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 800;
      font-size: 1.25rem;
      color: #fff;
      margin-bottom: 0.75rem;
      position: relative;
      z-index: 1;
    }

    .card-name {
      font-size: 1.5rem;
      font-weight: 700;
      color: #fff;
      position: relative;
      z-index: 1;
    }

    .card-title {
      font-size: 0.9rem;
      font-weight: 500;
      color: rgba(255,255,255,0.85);
      position: relative;
      z-index: 1;
    }

    .card-bottom {
      padding: 1.5rem 2rem 2rem;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }

    .card-row {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      font-size: 0.88rem;
    }

    .card-icon {
      width: 36px;
      height: 36px;
      border-radius: 8px;
      background: var(--surface-2);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1rem;
      flex-shrink: 0;
    }

    .card-icon svg {
      width: 18px;
      height: 18px;
      fill: var(--text);
    }

    .card-row-text {
      display: flex;
      flex-direction: column;
    }

    .card-row-label {
      font-size: 0.72rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-muted);
    }

    .card-row-value {
      font-weight: 500;
      color: var(--text);
      word-break: break-all;
    }

    .card-divider {
      border: none;
      border-top: 1px solid var(--border);
      margin: 0.25rem 0;
    }

    .card-tagline {
      font-size: 0.78rem;
      color: var(--text-muted);
      text-align: center;
      padding-top: 0.25rem;
      font-style: italic;
    }

    /* ---------- Actions ---------- */
    .actions {
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
      justify-content: center;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.75rem 1.75rem;
      border-radius: var(--radius);
      font-size: 0.95rem;
      font-weight: 600;
      transition: all var(--tr);
      cursor: pointer;
      border: none;
      font-family: inherit;
    }

    .btn-primary {
      background: var(--accent);
      color: #fff;
    }

    .btn-primary:hover {
      background: var(--accent-dark);
      transform: translateY(-2px);
      box-shadow: 0 8px 20px var(--accent-glow);
    }

    .btn-outline {
      border: 2px solid var(--accent);
      color: var(--accent);
      background: transparent;
    }

    .btn-outline:hover {
      background: var(--accent);
      color: #fff;
      transform: translateY(-2px);
    }

    .btn-icon-theme {
      position: fixed;
      top: 1.25rem;
      right: 1.25rem;
      width: 42px;
      height: 42px;
      border-radius: 50%;
      background: var(--surface);
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.15rem;
      cursor: pointer;
      transition: all var(--tr);
      z-index: 10;
    }

    .btn-icon-theme:hover {
      border-color: var(--accent);
    }

    .icon-sun, .icon-moon { pointer-events: none; }
    body.dark .icon-sun  { display: none; }
    body:not(.dark) .icon-moon { display: none; }

    /* ---------- Responsive ---------- */
    @media (max-width: 600px) {
      .calling-card { width: 100%; }
      .card-top { padding: 1.5rem; }
      .card-bottom { padding: 1.25rem 1.5rem 1.5rem; }
      .card-name { font-size: 1.25rem; }
    }
  </style>
</head>
<body class="light">

  <button class="btn-icon-theme" id="theme-toggle" aria-label="Toggle dark mode">
    <span class="icon-sun">☀️</span>
    <span class="icon-moon">🌙</span>
  </button>

  <div class="page-header">
    <h1>My Calling Card</h1>
    <p>Download my card and stay connected</p>
  </div>

  <div class="card-wrapper">
    <div class="calling-card" id="calling-card">

      <!-- Top / accent band -->
      <div class="card-top">
        <div class="card-initials">AG</div>
        <div class="card-name">Angelo Gabisan</div>
        <div class="card-title">Full Stack PHP Developer</div>
      </div>

      <!-- Bottom / contact details -->
      <div class="card-bottom">

        <div class="card-row">
          <div class="card-icon">📧</div>
          <div class="card-row-text">
            <span class="card-row-label">Email</span>
            <span class="card-row-value">gabisanangelo@yahoo.com.ph</span>
          </div>
        </div>

        <div class="card-row">
          <div class="card-icon">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" aria-hidden="true"><path d="M12 0C5.374 0 0 5.373 0 12c0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23A11.509 11.509 0 0 1 12 5.803c1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576C20.566 21.797 24 17.3 24 12c0-6.627-5.373-12-12-12z"/></svg>
          </div>
          <div class="card-row-text">
            <span class="card-row-label">GitHub</span>
            <span class="card-row-value">github.com/agabisan</span>
          </div>
        </div>

        <div class="card-row">
          <div class="card-icon">💼</div>
          <div class="card-row-text">
            <span class="card-row-label">LinkedIn</span>
            <span class="card-row-value">linkedin.com/in/angelo-gabisan-85973299</span>
          </div>
        </div>

        <hr class="card-divider" />

        <div class="card-tagline">Building scalable back-end services &amp; modern web apps</div>
      </div>

    </div>
  </div>

  <div class="actions">
    <button class="btn btn-primary" id="download-png" aria-label="Download card as PNG">
      📥 Download as PNG
    </button>
    <a href="index.html" class="btn btn-outline">← Back to Portfolio</a>
  </div>

  <script>
    /* ---------- Theme Toggle ---------- */
    (function initTheme() {
      var stored = localStorage.getItem('theme');
      if (stored === 'dark' || (!stored && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
        document.body.classList.remove('light');
        document.body.classList.add('dark');
      }
    })();

    document.getElementById('theme-toggle').addEventListener('click', function () {
      var isDark = document.body.classList.toggle('dark');
      document.body.classList.toggle('light', !isDark);
      localStorage.setItem('theme', isDark ? 'dark' : 'light');
    });

    /* ---------- Download as PNG ---------- */
    document.getElementById('download-png').addEventListener('click', function () {
      var card = document.getElementById('calling-card');
      var btn = this;
      btn.textContent = '⏳ Generating…';
      btn.disabled = true;

      html2canvas(card, {
        scale: 2,
        useCORS: true,
        backgroundColor: 'transparent'
      }).then(function (canvas) {
        var link = document.createElement('a');
        link.download = 'angelo-gabisan-calling-card.png';
        link.href = canvas.toDataURL('image/png');
        link.click();
        btn.innerHTML = '📥 Download as PNG';
        btn.disabled = false;
      }).catch(function () {
        btn.innerHTML = '📥 Download as PNG';
        btn.disabled = false;
        alert('Could not generate image. Please try again.');
      });
    });
  </script>

</body>
</html>
